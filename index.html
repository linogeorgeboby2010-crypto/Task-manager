<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            padding: 10px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        li {
            list-style: none;
            background: #f4f4f4;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        li.done {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .delete {
            background: red;
            padding: 5px 8px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Tasks</h1>

    <input type="text" id="taskInput" placeholder="Add a task">
    <button onclick="addTask()">+</button>

    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") return;

    let li = document.createElement("li");
    li.textContent = task;

    li.onclick = function() {
        li.classList.toggle("done");
    };

    let del = document.createElement("span");
    del.textContent = "X";
    del.className = "delete";
    del.onclick = function(e) {
    e.stopPropagation();
    li.remove();
};

li.appendChild(del);
document.getElementById("taskList").appendChild(li);

input.value = "";
}
</script>
